<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Georgia;
  background:#0b0b0f;
  color:white;
  text-align:center;
  margin:0;
}

#board{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.card{
  width:45%;
  background:#1c1c26;
  padding:8px;
  border-radius:10px;
}

.card.selected{
  border:2px solid gold;
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
}

button{
  margin-top:5px;
  padding:6px;
  width:100%;
  border:none;
  border-radius:6px;
}

.btn-select{
  background:gold;
}

.btn-remove{
  background:#ff4d4d;
  color:white;
}

#timeline{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:15px;
}

.slot{
  height:150px;
  border:2px dashed #666;
  border-radius:10px;
  padding:5px;
}

.correct{ border-color:#00ffb3; }
.incorrect{ border-color:#ff4d4d; }

</style>
</head>

<body>

<h2>🕰️ Ordena cronológicamente</h2>

<div id="board"></div>

<div id="timeline">
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
</div>

<button onclick="verificar()">Verificar</button>

<script>

let data = [
  {img:'img1.jpg', year:1861, titulo:'Exconvento como hospital municipal y otros usos estatales'},
  {img:'img2.jpg', year:1880, titulo:'Fotografía del exconvento de Alfred Briquet'},
  {img:'img3.jpg', year:1976, titulo:'Fundación de la Fototeca Nacional (planta alta)'},
  {img:'img4.jpeg', year:1984, titulo:'Apertura del Museo de la Fotografía de la Fototeca Nacional'},
  {img:'img5.jpg', year:2000, titulo:'50 Aniversario de la Fototeca Nacional'}
];

data.sort(()=>Math.random()-0.5);

const board = document.getElementById("board");
const slots = document.querySelectorAll(".slot");

let selected = null;

// crear tarjetas
data.forEach(item=>{
  let card=document.createElement("div");
  card.className="card";
  card.dataset.year=item.year;

  card.innerHTML=`
    <img src="${item.img}">
    <p>${item.titulo}</p>
    <button class="btn-select">Elegir</button>
  `;

  card.querySelector(".btn-select").onclick=()=>{
    document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
    card.classList.add("selected");
    selected=card;
  };

  board.appendChild(card);
});

// colocar
slots.forEach(slot=>{
  slot.onclick=()=>{

    if(!selected) return;

    if(slot.firstChild){
      board.appendChild(slot.firstChild);
    }

    let card = selected;
    selected=null;

    // botón quitar
    let removeBtn = document.createElement("button");
    removeBtn.innerText="Quitar";
    removeBtn.className="btn-remove";

    removeBtn.onclick=(e)=>{
      e.stopPropagation();
      board.appendChild(card);
      removeBtn.remove();
    };

    slot.innerHTML="";
    slot.appendChild(card);
    slot.appendChild(removeBtn);

    document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
  };
});

// verificar
function verificar(){

  let cards=[...slots].map(s=>s.querySelector(".card"));

  if(cards.includes(null)){
    alert("Coloca todas las imágenes");
    return;
  }

  let years=cards.map(c=>parseInt(c.dataset.year));

  let allCorrect=true;

  slots.forEach((slot,i)=>{
    slot.classList.remove("correct","incorrect");

    if(i===0 || years[i]>=years[i-1]){
      slot.classList.add("correct");
    }else{
      slot.classList.add("incorrect");
      allCorrect=false;
    }
  });

  if(allCorrect){
    slots.forEach(s=>{
      let c=s.querySelector(".card .caption");
      if(c){
        c.innerHTML=s.querySelector(".card").dataset.year;
      }
    });

    alert("🎉 ¡Correcto!");
  }else{
    alert("❌ Revisa");
  }
}

</script>

</body>
</html>
