<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Línea del tiempo</title>

<style>
body{
  font-family: Georgia, serif;
  background:#0b0b0f;
  color:#f5f5f5;
  text-align:center;
  margin:0;
}

h2{
  font-size:20px;
}

#board{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin:10px;
}

.card{
  width:45%;
  max-width:160px;
  background:#1c1c26;
  border-radius:12px;
  padding:6px;
  cursor:pointer;
}

.card.selected{
  border:2px solid gold;
}

.card img{
  width:100%;
  height:110px;
  object-fit:cover;
  border-radius:8px;
}

.caption{
  font-size:12px;
}

#timeline{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin:20px;
}

.slot{
  width:90%;
  max-width:300px;
  height:150px;
  margin:auto;
  border:2px dashed #666;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.correct{
  color:#00ffb3;
}

.incorrect{
  color:#ff4d4d;
}

button{
  padding:12px;
  font-size:16px;
  background:#d4af37;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<h2>🕰️ Exconvento de San Francisco</h2>
<p>Ordena las imágenes en orden cronológico</p>

<div id="board"></div>

<div id="timeline">
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
</div>

<button onclick="verificar()">Verificar</button>

<script>

let data = [
  {img:'img1.jpg', year:'1861', titulo:'Exconvento como hospital municipal y otros usos estatales'},
  {img:'img2.jpg', year:'1880', titulo:'Fotografía del exconvento de Alfred Briquet'},
  {img:'img3.jpg', year:'1976', titulo:'Fundación de la Fototeca Nacional (planta alta)'},
  {img:'img4.jpeg', year:'1984', titulo:'Apertura del Museo de la Fotografía de la Fototeca Nacional'},
  {img:'img5.jpg', year:'2000', titulo:'50 Aniversario de la Fototeca Nacional'}
];

data.sort(()=>Math.random()-0.5);

const board = document.getElementById("board");
const slots = document.querySelectorAll(".slot");

let selected = null;

// crear tarjetas
data.forEach(item=>{
  let card = document.createElement("div");
  card.className="card";
  card.dataset.year=item.year;

  card.innerHTML = `
    <img src="${item.img}">
    <div class="caption">${item.titulo}</div>
  `;

  card.addEventListener("click", ()=>{
    document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
    card.classList.add("selected");
    selected = card;
  });

  board.appendChild(card);
});

// colocar en slots
slots.forEach(slot=>{
  slot.addEventListener("click", ()=>{
    if(selected && slot.children.length===0){
      slot.appendChild(selected);
      selected.classList.remove("selected");
      selected = null;
    }
  });
});

// 🔥 VALIDACIÓN CORRECTA
function verificar(){

  let cards = Array.from(slots).map(s=>s.querySelector(".card"));

  // 🚨 si faltan piezas → error
  if(cards.includes(null)){
    alert("⚠️ Coloca todas las imágenes primero");
    return;
  }

  let years = cards.map(c=>parseInt(c.dataset.year));

  let correct = true;

  for(let i=0;i<years.length-1;i++){
    if(years[i] > years[i+1]){
      correct = false;
    }
  }

  slots.forEach((s,i)=>{
    let card = s.querySelector(".card");

    card.classList.remove("correct","incorrect");
    card.classList.add(correct ? "correct" : "incorrect");

    if(correct){
      card.querySelector(".caption").innerHTML = card.dataset.year;
    }
  });

  alert(correct ? "🎉 ¡Correcto!" : "❌ Intenta nuevamente");
}

</script>

</body>
</html>
