<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Línea del tiempo</title>

<style>
body{
  font-family: Georgia, serif;
  background:#0b0b0f;
  color:#f5f5f5;
  text-align:center;
  margin:0;
}

#board{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin:10px;
}

.card{
  width:45%;
  max-width:160px;
  background:#1c1c26;
  border-radius:12px;
  padding:6px;
}

.card.selected{
  border:2px solid gold;
}

.card img{
  width:100%;
  height:110px;
  object-fit:cover;
  border-radius:8px;
}

.caption{
  font-size:12px;
}

#timeline{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin:20px;
}

.slot{
  width:90%;
  max-width:320px;
  height:150px;
  margin:auto;
  border:2px dashed #666;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.slot.active{
  border-color:gold;
}

.correct{
  border-color:#00ffb3;
}

.incorrect{
  border-color:#ff4d4d;
}

button{
  padding:12px;
  font-size:16px;
  background:#d4af37;
  border:none;
  border-radius:8px;
}

#mensaje{
  margin-top:10px;
  font-size:18px;
}
</style>
</head>

<body>

<h2>🕰️ Exconvento de San Francisco</h2>
<p>Ordena las imágenes en orden cronológico</p>

<div id="board"></div>

<div id="timeline">
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
</div>

<button onclick="verificar()">Verificar</button>

<div id="mensaje"></div>

<script>

let data = [
  {img:'img1.jpg', year:'1861', titulo:'Exconvento como hospital municipal y otros usos estatales'},
  {img:'img2.jpg', year:'1880', titulo:'Fotografía del exconvento de Alfred Briquet'},
  {img:'img3.jpg', year:'1976', titulo:'Fundación de la Fototeca Nacional (planta alta)'},
  {img:'img4.jpeg', year:'1984', titulo:'Apertura del Museo de la Fotografía de la Fototeca Nacional'},
  {img:'img5.jpg', year:'2000', titulo:'50 Aniversario de la Fototeca Nacional'}
];

data.sort(()=>Math.random()-0.5);

const board = document.getElementById("board");
const slots = document.querySelectorAll(".slot");
const mensaje = document.getElementById("mensaje");

let selected = null;

// crear tarjetas
data.forEach(item=>{
  let card = document.createElement("div");
  card.className="card";
  card.dataset.year=item.year;

  card.innerHTML = `
    <img src="${item.img}">
    <div class="caption">${item.titulo}</div>
  `;

  // seleccionar tarjeta
  card.onclick = ()=>{
    document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
    card.classList.add("selected");
    selected = card;

    slots.forEach(s=>s.classList.add("active"));
  };

  board.appendChild(card);
});

// interacción con slots
slots.forEach(slot=>{
  slot.onclick = ()=>{

    if(!selected) return;

    // si ya hay tarjeta → regresarla
    if(slot.firstChild){
      board.appendChild(slot.firstChild);
    }

    slot.appendChild(selected);
    selected.classList.remove("selected");
    selected = null;

    slots.forEach(s=>s.classList.remove("active"));
  };
});

// devolver tarjeta al tablero
board.addEventListener("click", e=>{
  if(e.target.closest(".card")){
    let card = e.target.closest(".card");

    if(card.parentElement.classList.contains("slot")){
      board.appendChild(card);
    }
  }
});

// verificar
function verificar(){

  let cards = Array.from(slots).map(s=>s.querySelector(".card"));

  if(cards.includes(null)){
    mensaje.innerHTML = "⚠️ Coloca todas las imágenes";
    return;
  }

  let years = cards.map(c=>parseInt(c.dataset.year));

  let correct = true;

  for(let i=0;i<years.length-1;i++){
    if(years[i] > years[i+1]){
      correct = false;
    }
  }

  slots.forEach((s,i)=>{
    let card = s.querySelector(".card");

    s.classList.remove("correct","incorrect");
    s.classList.add(correct ? "correct" : "incorrect");

    if(correct){
      card.querySelector(".caption").innerHTML = card.dataset.year;
    }
  });

  mensaje.innerHTML = correct ? "🎉 ¡Correcto!" : "❌ Intenta nuevamente";
}

</script>

</body>
</html>
