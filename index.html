<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Línea del tiempo - Exhibición</title>

<style>
body{
  font-family: Georgia, serif;
  background:#0b0b0f;
  color:#f5f5f5;
  text-align:center;
  margin:0;
}

h2{
  margin-top:10px;
}

#board{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
  margin:10px;
}

.card{
  width:45%;
  max-width:160px;
  background:#1c1c26;
  border-radius:12px;
  padding:6px;
  cursor:pointer;
  transition:.3s;
}

.card.selected{
  border:2px solid gold;
  transform:scale(1.05);
}

.card.locked{
  opacity:.5;
  pointer-events:none;
}

.card img{
  width:100%;
  height:110px;
  object-fit:cover;
  border-radius:8px;
}

.caption{
  font-size:12px;
}

#timeline{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin:20px;
}

.slot{
  width:90%;
  max-width:320px;
  height:160px;
  margin:auto;
  border:2px dashed #666;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.3s;
}

.slot.correct{ border-color:#00ffb3; }
.slot.incorrect{ border-color:#ff4d4d; }
.slot.active{ border-color:gold; }

button{
  padding:12px;
  margin:5px;
  font-size:16px;
  background:#d4af37;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#mensaje{
  font-size:18px;
  margin-top:10px;
}

#ficha{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.95);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  padding:20px;
}

.panel{
  max-width:500px;
  background:#1c1c26;
  padding:20px;
  border-radius:12px;
}
</style>
</head>

<body>

<h2>🕰️ Exconvento de San Francisco</h2>
<p>Ordena las imágenes en orden cronológico</p>

<div id="board"></div>

<div id="timeline">
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
</div>

<button onclick="verificar()">Verificar</button>
<button onclick="reiniciar()">Reiniciar</button>

<div id="mensaje"></div>

<div id="ficha">
  <div class="panel" id="panelTexto"></div>
  <button onclick="cerrarFicha()">Cerrar</button>
</div>

<script>

let data = [
  {img:'img1.jpg', year:'1861', titulo:'Exconvento como hospital municipal y otros usos estatales'},
  {img:'img2.jpg', year:'1880', titulo:'Fotografía del exconvento de Alfred Briquet'},
  {img:'img3.jpg', year:'1976', titulo:'Fundación de la Fototeca Nacional (planta alta)'},
  {img:'img4.jpeg', year:'1984', titulo:'Apertura del Museo de la Fotografía de la Fototeca Nacional'},
  {img:'img5.jpg', year:'2000', titulo:'50 Aniversario de la Fototeca Nacional'}
];

const board = document.getElementById("board");
const slots = document.querySelectorAll(".slot");
const mensaje = document.getElementById("mensaje");

let selected=null;
let timer;

// iniciar
function iniciar(){
  board.innerHTML="";
  slots.forEach(s=>s.innerHTML="");
  data.sort(()=>Math.random()-0.5);

  data.forEach(item=>{
    let card=document.createElement("div");
    card.className="card";
    card.dataset.year=item.year;

    card.innerHTML=`<img src="${item.img}"><div class="caption">${item.titulo}</div>`;

    card.onclick=()=>{
      if(card.classList.contains("locked")) return;
      document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
      card.classList.add("selected");
      selected=card;
      slots.forEach(s=>s.classList.add("active"));
    };

    board.appendChild(card);
  });
}

slots.forEach(slot=>{
  slot.onclick=()=>{
    if(!selected) return;

    if(slot.firstChild && !slot.firstChild.classList.contains("locked")){
      board.appendChild(slot.firstChild);
    }

    slot.appendChild(selected);
    selected.classList.remove("selected");
    selected=null;
    slots.forEach(s=>s.classList.remove("active"));
    resetTimer();
  };
});

function verificar(){

  let cards=[...slots].map(s=>s.querySelector(".card"));

  if(cards.includes(null)){
    mensaje.innerHTML="⚠️ Completa todos los espacios";
    return;
  }

  let years=cards.map(c=>parseInt(c.dataset.year));
  let ok=true;

  for(let i=0;i<years.length-1;i++){
    if(years[i]>years[i+1]) ok=false;
  }

  slots.forEach((s,i)=>{
    let c=s.querySelector(".card");
    s.classList.remove("correct","incorrect");

    if(i===0 || years[i]>=years[i-1]){
      s.classList.add("correct");
      c.classList.add("locked");
    }else{
      s.classList.add("incorrect");
    }
  });

  if(ok){
    mensaje.innerHTML="🎉 ¡Línea del tiempo completada!";
    mostrarFicha();
    slots.forEach(s=>{
      let c=s.querySelector(".caption");
      let card=s.querySelector(".card");
      c.innerHTML=card.dataset.year;
    });
  }else{
    mensaje.innerHTML="❌ Revisa los elementos marcados";
  }
}

// ficha museo
function mostrarFicha(){
  let panel=document.getElementById("panelTexto");
  panel.innerHTML=`
    <h3>Historia del Exconvento</h3>
    <p>El Exconvento de San Francisco ha tenido múltiples usos a lo largo del tiempo,
    desde hospital municipal hasta espacio cultural, albergando hoy la Fototeca Nacional
    y el Museo de la Fotografía.</p>
  `;
  document.getElementById("ficha").style.display="flex";
}

function cerrarFicha(){
  document.getElementById("ficha").style.display="none";
}

// reinicio
function reiniciar(){
  iniciar();
  mensaje.innerHTML="";
}

// ⏳ modo atracción (reinicio automático)
function resetTimer(){
  clearTimeout(timer);
  timer=setTimeout(reiniciar,60000);
}

// pantalla completa automática
document.body.onclick=()=>{
  if(document.documentElement.requestFullscreen){
    document.documentElement.requestFullscreen();
  }
};

iniciar();
resetTimer();

</script>

</body>
</html>
