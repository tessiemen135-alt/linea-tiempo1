<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Línea del tiempo</title>

<style>
body{
  font-family: Georgia;
  background:#0b0b0f;
  color:white;
  text-align:center;
}

#board{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:20px;
}

.card{
  width:180px;
  background:#1c1c26;
  border-radius:10px;
  padding:10px;
  cursor:grab;
}

.card img{
  width:100%;
  height:130px;
  object-fit:cover;
}

#timeline{
  display:flex;
  justify-content:center;
  gap:20px;
}

.slot{
  width:180px;
  height:220px;
  border:2px dashed #666;
}
</style>
</head>

<body>

<h2>Ordena cronológicamente</h2>

<div id="board"></div>

<div id="timeline">
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
</div>

<button onclick="verificar()">Verificar</button>

<script>

let data = [
  {img:'img1.jpg', year:1861, titulo:'Exconvento como hospital municipal y otros usos estatales'},
  {img:'img2.jpg', year:1880, titulo:'Fotografía del exconvento de Alfred Briquet'},
  {img:'img3.jpg', year:1976, titulo:'Fundación de la Fototeca Nacional (planta alta)'},
  {img:'img4.jpeg', year:1984, titulo:'Apertura del Museo de la Fotografía de la Fototeca Nacional'},
  {img:'img5.jpg', year:2000, titulo:'50 Aniversario de la Fototeca Nacional'}
];

data.sort(()=>Math.random()-0.5);

const board = document.getElementById("board");
const slots = document.querySelectorAll(".slot");

data.forEach(item=>{
  let card = document.createElement("div");
  card.className="card";
  card.draggable=true;
  card.dataset.year=item.year;

  card.innerHTML = `
    <img src="${item.img}">
    <p>${item.titulo}</p>
  `;

  card.ondragstart = e=>{
    e.dataTransfer.setData("id", item.year);
    e.dataTransfer.setData("html", card.outerHTML);
    setTimeout(()=>card.remove(),0);
  };

  board.appendChild(card);
});

slots.forEach(slot=>{
  slot.ondragover = e=>e.preventDefault();

  slot.ondrop = e=>{
    e.preventDefault();

    if(slot.children.length>0) return;

    let html = e.dataTransfer.getData("html");
    slot.innerHTML = html;
  };
});

function verificar(){

  let orden = [...slots].map(s=>{
    let c = s.querySelector(".card");
    return c ? parseInt(c.dataset.year) : 0;
  });

  for(let i=0;i<orden.length-1;i++){
    if(orden[i] > orden[i+1]){
      alert("Incorrecto");
      return;
    }
  }

  alert("Correcto 🎉");
}

</script>

</body>
</html>
