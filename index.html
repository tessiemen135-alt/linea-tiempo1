<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exposición con feedback</title>

<style>
body{
  font-family: Georgia, serif;
  background:#0b0b0f;
  color:#f5f5f5;
  text-align:center;
  margin:0;
}

h2{
  font-size:22px;
}

#board{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
  margin:15px;
}

.card{
  width:140px;
  background:#1c1c26;
  border-radius:12px;
  padding:8px;
  cursor:pointer;
  transition:0.2s;
}

.card.selected{
  border:2px solid gold;
}

.card img{
  width:100%;
  height:100px;
  object-fit:cover;
  border-radius:8px;
}

.caption{
  margin-top:5px;
  font-size:12px;
}

#timeline{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
  margin:20px;
}

.slot{
  width:140px;
  height:160px;
  border:2px dashed #666;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.correct{
  color:#00ffb3;
  font-weight:bold;
}

.incorrect{
  color:#ff4d4d;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#d4af37;
  color:black;
  cursor:pointer;
  font-size:16px;
}
</style>
</head>

<body>

<h2>🕰️ Exconvento de San Francisco</h2>
<p>Ordena las imágenes en orden cronológico</p>

<div id="board"></div>

<div id="timeline">
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
</div>

<button onclick="verificar()">Verificar</button>

<script>

// 🔥 DATOS (tus títulos originales)
let data = [
  {img:'img1.jpg', year:'1861', titulo:'Inicio del Exconvento'},
  {img:'img2.jpg', year:'1880', titulo:'Expansión del complejo'},
  {img:'img3.jpg', year:'1976', titulo:'Restauración'},
  {img:'img4.jpeg', year:'1984', titulo:'Apertura cultural'},
  {img:'img5.jpg', year:'2000', titulo:'Uso contemporáneo'}
];

// mezclar
data.sort(()=>Math.random()-0.5);

const board = document.getElementById("board");
const slots = document.querySelectorAll(".slot");

let selected = null;

// crear tarjetas
data.forEach(item=>{
  let card = document.createElement("div");
  card.className="card";
  card.dataset.year=item.year;

  card.innerHTML = `
    <img src="${item.img}">
    <div class="caption">${item.titulo}</div>
  `;

  // 📱 selección táctil
  card.addEventListener("click", ()=>{
    document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
    card.classList.add("selected");
    selected = card;
  });

  // 💻 drag
  card.draggable=true;
  card.addEventListener("dragstart", e=>{
    e.dataTransfer.setData("html", card.outerHTML);
    setTimeout(()=>card.remove(),0);
  });

  board.appendChild(card);
});

// slots
slots.forEach(slot=>{

  // drag (computadora)
  slot.addEventListener("dragover", e=>e.preventDefault());

  slot.addEventListener("drop", e=>{
    e.preventDefault();
    if(slot.children.length>0) return;

    let html = e.dataTransfer.getData("html");
    slot.innerHTML = html;
    activarEventos(slot.firstChild);
  });

  // touch (celular)
  slot.addEventListener("click", ()=>{
    if(selected && slot.children.length===0){
      slot.appendChild(selected);
      selected.classList.remove("selected");
      selected = null;
    }
  });

});

// reactivar eventos después de mover
function activarEventos(card){

  card.addEventListener("click", ()=>{
    document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
    card.classList.add("selected");
    selected = card;
  });

  card.draggable=true;
  card.addEventListener("dragstart", e=>{
    e.dataTransfer.setData("html", card.outerHTML);
    setTimeout(()=>card.remove(),0);
  });
}

// verificar
function verificar(){

  let orden = Array.from(slots).map(s=>{
    let card = s.querySelector(".card");
    return card ? parseInt(card.dataset.year) : 0;
  });

  let correct = true;

  for(let i=0;i<orden.length-1;i++){
    if(orden[i] > orden[i+1]){
      correct = false;
    }
  }

  slots.forEach(s=>{
    let card = s.querySelector(".card");
    if(card){
      card.classList.remove("correct","incorrect");
      card.classList.add(correct ? "correct" : "incorrect");

      if(correct){
        card.querySelector(".caption").innerHTML = card.dataset.year;
      }
    }
  });

  alert(correct ? "🎉 ¡Correcto!" : "❌ Intenta otra vez");
}

</script>

</body>
</html>
