<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Línea del tiempo</title>

<style>
body{
  font-family: Georgia, serif;
  background:#0b0b0f;
  color:#f5f5f5;
  text-align:center;
  margin:0;
}

h2{ margin:10px 0; }

#instruccion{
  margin-bottom:10px;
  font-size:14px;
  color:#ccc;
}

#board{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
  margin:10px;
}

.card{
  width:45%;
  max-width:180px;
  background:#1c1c26;
  border-radius:12px;
  padding:8px;
  cursor:pointer;
  transition:.2s;
}

.card.selected{
  border:3px solid gold;
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:8px;
  pointer-events:none;
}

.caption{
  font-size:13px;
  margin-top:5px;
}

#timeline{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
  margin:20px;
}

.slot{
  width:180px;
  height:200px;
  border:2px dashed #666;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.slot.active{
  border-color:gold;
}

.correct{
  border-color:#00ffb3 !important;
}

.incorrect{
  border-color:#ff4d4d !important;
}

button{
  padding:10px 20px;
  font-size:16px;
  background:#d4af37;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#mensaje{
  margin-top:10px;
  font-size:18px;
}
</style>
</head>

<body>

<h2>🕰️ Exconvento de San Francisco</h2>
<p id="instruccion"></p>

<div id="board"></div>

<div id="timeline">
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
</div>

<button onclick="verificar()">Verificar</button>

<div id="mensaje"></div>

<script>

// 📱 detectar dispositivo
const esMovil = /Mobi|Android|iPhone/i.test(navigator.userAgent);

document.getElementById("instruccion").innerText =
  esMovil
  ? "📱 Toca una imagen y luego toca un recuadro para colocarla"
  : "🖥️ Arrastra la imagen con el mouse y suéltala en un recuadro";

// datos
let data = [
  {img:'img1.jpg', year:1861, titulo:'Exconvento como hospital municipal y otros usos estatales'},
  {img:'img2.jpg', year:1880, titulo:'Fotografía del exconvento de Alfred Briquet'},
  {img:'img3.jpg', year:1976, titulo:'Fundación de la Fototeca Nacional (planta alta)'},
  {img:'img4.jpeg', year:1984, titulo:'Apertura del Museo de la Fotografía de la Fototeca Nacional'},
  {img:'img5.jpg', year:2000, titulo:'50 Aniversario de la Fototeca Nacional'}
];

data.sort(()=>Math.random()-0.5);

const board = document.getElementById("board");
const slots = document.querySelectorAll(".slot");
const mensaje = document.getElementById("mensaje");

let selected = null;

// crear tarjetas
data.forEach(item=>{
  let card = document.createElement("div");
  card.className="card";
  card.dataset.year = item.year;

  card.innerHTML = `
    <img src="${item.img}">
    <div class="caption">${item.titulo}</div>
  `;

  // 📱 tap
  card.addEventListener("click", ()=>{
    if(!esMovil) return;

    document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
    card.classList.add("selected");
    selected = card;
    slots.forEach(s=>s.classList.add("active"));
  });

  // 🖥️ drag
  card.draggable = true;

  card.addEventListener("dragstart", ()=>{
    card.classList.add("dragging");
  });

  card.addEventListener("dragend", ()=>{
    card.classList.remove("dragging");
  });

  board.appendChild(card);
});

// slots
slots.forEach(slot=>{

  // 🖥️ drag
  slot.addEventListener("dragover", e=>e.preventDefault());

  slot.addEventListener("drop", e=>{
    e.preventDefault();

    let card = document.querySelector(".dragging");
    if(!card) return;

    if(slot.firstChild){
      board.appendChild(slot.firstChild);
    }

    slot.appendChild(card);
  });

  // 📱 touch
  slot.addEventListener("click", ()=>{
    if(!esMovil || !selected) return;

    if(slot.firstChild){
      board.appendChild(slot.firstChild);
    }

    slot.appendChild(selected);
    selected.classList.remove("selected");
    selected = null;

    slots.forEach(s=>s.classList.remove("active"));
  });
});

// verificar
function verificar(){

  let cards = [...slots].map(s=>s.querySelector(".card"));

  if(cards.includes(null)){
    mensaje.innerHTML = "⚠️ Coloca todas las imágenes";
    return;
  }

  let years = cards.map(c=>parseInt(c.dataset.year));
  let allCorrect = true;

  slots.forEach(s=>{
    s.classList.remove("correct","incorrect");
  });

  for(let i=0;i<years.length;i++){

    let prev = years[i-1];
    let curr = years[i];
    let next = years[i+1];

    let ok = true;

    if(prev !== undefined && curr < prev) ok = false;
    if(next !== undefined && curr > next) ok = false;

    if(ok){
      slots[i].classList.add("correct");
    }else{
      slots[i].classList.add("incorrect");
      allCorrect = false;
    }
  }

  if(allCorrect){
    slots.forEach(s=>{
      let card = s.querySelector(".card");
      card.querySelector(".caption").innerHTML = card.dataset.year;
    });

    mensaje.innerHTML = "🎉 ¡Correcto!";
  }else{
    mensaje.innerHTML = "❌ Revisa las posiciones";
  }
}

</script>

</body>
</html>
