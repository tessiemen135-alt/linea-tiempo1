<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Línea del tiempo</title>

<style>
body{
  font-family: Georgia;
  background:#0b0b0f;
  color:white;
  text-align:center;
}

#board{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:20px;
}

.card{
  width:180px;
  background:#1c1c26;
  border-radius:10px;
  padding:10px;
  cursor:grab;
}

.card img{
  width:100%;
  height:130px;
  object-fit:cover;
}

.caption{
  margin-top:5px;
}

#timeline{
  display:flex;
  justify-content:center;
  gap:20px;
}

.slot{
  width:180px;
  height:220px;
  border:2px dashed #666;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* 🔥 feedback */
.correct{
  border-color:#00ffb3 !important;
}

.incorrect{
  border-color:#ff4d4d !important;
}
</style>
</head>

<body>

<h2>🕰️ Ordena cronológicamente</h2>

<div id="board"></div>

<div id="timeline">
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
</div>

<button onclick="verificar()">Verificar</button>

<script>

let data = [
  {img:'img1.jpg', year:1861, titulo:'Exconvento como hospital municipal y otros usos estatales'},
  {img:'img2.jpg', year:1880, titulo:'Fotografía del exconvento de Alfred Briquet'},
  {img:'img3.jpg', year:1976, titulo:'Fundación de la Fototeca Nacional (planta alta)'},
  {img:'img4.jpeg', year:1984, titulo:'Apertura del Museo de la Fotografía de la Fototeca Nacional'},
  {img:'img5.jpg', year:2000, titulo:'50 Aniversario de la Fototeca Nacional'}
];

data.sort(()=>Math.random()-0.5);

const board = document.getElementById("board");
const slots = document.querySelectorAll(".slot");

// crear tarjetas
data.forEach(item=>{
  let card = document.createElement("div");
  card.className="card";
  card.draggable=true;
  card.dataset.year=item.year;

  card.innerHTML = `
    <img src="${item.img}">
    <div class="caption">${item.titulo}</div>
  `;

  card.ondragstart = e=>{
    e.dataTransfer.setData("html", card.outerHTML);
    setTimeout(()=>card.remove(),0);
  };

  board.appendChild(card);
});

// slots
slots.forEach(slot=>{
  slot.ondragover = e=>e.preventDefault();

  slot.ondrop = e=>{
    e.preventDefault();

    if(slot.children.length>0) return;

    let html = e.dataTransfer.getData("html");
    slot.innerHTML = html;

    activarDrag(slot.firstChild);
  };
});

// reactivar drag
function activarDrag(card){
  card.draggable=true;

  card.ondragstart = e=>{
    e.dataTransfer.setData("html", card.outerHTML);
    setTimeout(()=>card.remove(),0);
  };
}

// 🔥 VERIFICACIÓN CON FEEDBACK
function verificar(){

  let cards = [...slots].map(s=>s.querySelector(".card"));

  // evitar validar incompleto
  if(cards.includes(null)){
    alert("Coloca todas las imágenes");
    return;
  }

  let years = cards.map(c=>parseInt(c.dataset.year));

  let allCorrect = true;

  // limpiar estilos
  slots.forEach(s=>{
    s.classList.remove("correct","incorrect");
  });

  // validar cada posición
  for(let i=0;i<years.length;i++){

    let prev = years[i-1];
    let current = years[i];
    let next = years[i+1];

    let correcto = true;

    if(prev !== undefined && current < prev) correcto = false;
    if(next !== undefined && current > next) correcto = false;

    if(correcto){
      slots[i].classList.add("correct");
    }else{
      slots[i].classList.add("incorrect");
      allCorrect = false;
    }
  }

  // 🎉 si todo correcto → mostrar años
  if(allCorrect){
    slots.forEach(s=>{
      let card = s.querySelector(".card");
      let caption = card.querySelector(".caption");
      caption.innerHTML = card.dataset.year;
    });

    alert("🎉 ¡Correcto!");
  }else{
    alert("❌ Revisa las posiciones");
  }
}

</script>

</body>
</html>
