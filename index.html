<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Exposición con feedback</title>

<style>
body{
  font-family: Georgia, serif;
  background:#0b0b0f;
  color:#f5f5f5;
  text-align:center;
  margin:0;
}

#board{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:20px;
}

.card{
  width:180px;
  background:#1c1c26;
  border-radius:12px;
  padding:10px;
  cursor:grab;
}

.card img{
  width:100%;
  height:130px;
  object-fit:cover;
  border-radius:10px;
}

.caption{
  margin-top:6px;
  font-size:14px;
}

.slot{
  width:180px;
  height:220px;
  border:2px dashed #666;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
}

#timeline{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:30px;
}

.correct{
  color:#00ffb3;
  font-weight:bold;
}

.incorrect{
  color:#ff4d4d;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#d4af37;
  color:black;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>🕰️ Exconvento de San Francisco</h2>
<p>Ordena las imágenes en orden cronológico</p>

<div id="board"></div>

<div id="timeline">
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
  <div class="slot"></div>
</div>

<button onclick="verificar()">Verificar</button>

<script>

// 🔥 DATOS (sin mostrar años al inicio)
let data = [
  {img:'img1.jpg', year:'1861', titulo:'Inicio del Exconvento'},
  {img:'img2.jpg', year:'1880', titulo:'Expansión del complejo'},
  {img:'img3.jpg', year:'1976', titulo:'Restauración'},
  {img:'img4.jpeg', year:'1984', titulo:'Apertura cultural'},
  {img:'img5.jpg', year:'2000', titulo:'Uso contemporáneo'}
];

// mezclar
data.sort(()=>Math.random()-0.5);

const board = document.getElementById("board");
const slots = document.querySelectorAll(".slot");

// crear tarjetas
data.forEach(item=>{
  let card = document.createElement("div");
  card.className="card";
  card.draggable=true;
  card.dataset.year=item.year;

  card.innerHTML = `
    <img src="${item.img}">
    <div class="caption">${item.titulo}</div>
  `;

  card.addEventListener("dragstart", e=>{
    e.dataTransfer.setData("year", card.dataset.year);
    e.dataTransfer.setData("html", card.outerHTML);
    setTimeout(()=>card.remove(),0);
  });

  board.appendChild(card);
});

// slots
slots.forEach(slot=>{
  slot.addEventListener("dragover", e=>e.preventDefault());

  slot.addEventListener("drop", e=>{
    e.preventDefault();

    if(slot.children.length > 0) return;

    let html = e.dataTransfer.getData("html");
    slot.innerHTML = html;

    let newCard = slot.firstChild;

    newCard.addEventListener("dragstart", ev=>{
      ev.dataTransfer.setData("year", newCard.dataset.year);
      ev.dataTransfer.setData("html", newCard.outerHTML);
      setTimeout(()=>newCard.remove(),0);
    });
  });
});

// verificar
function verificar(){
  let correct = true;

  let orden = Array.from(slots).map(s=>{
    let card = s.querySelector(".card");
    return card ? parseInt(card.dataset.year) : 0;
  });

  for(let i=0;i<orden.length-1;i++){
    if(orden[i] > orden[i+1]){
      correct = false;
    }
  }

  slots.forEach(s=>{
    let card = s.querySelector(".card");
    if(card){
      card.classList.remove("correct","incorrect");
      card.classList.add(correct ? "correct" : "incorrect");

      // 🔥 SOLO SI ESTÁ CORRECTO → mostrar año
      if(correct){
        let caption = card.querySelector(".caption");
        caption.innerHTML = card.dataset.year;
      }
    }
  });

  if(correct){
    alert("🎉 ¡Correcto! Has ordenado la línea del tiempo");
  } else {
    alert("❌ Intenta nuevamente");
  }
}

</script>

</body>
</html>
